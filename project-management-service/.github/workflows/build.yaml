name: Project Management Service CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      pull-requests: write
    uses: OrganiStation-org/shared-workflows/.github/workflows/reusable-ci.yaml@main
    with:
      image_name: project-management-service
      sonar_project_key: organistation-projects
      sonar_org: "organistation-org"
    secrets: inherit
