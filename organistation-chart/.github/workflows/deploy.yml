name: Continuous Deployment (Helm)

on:
  push:
    branches: [ develop, main ]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Helm Chart
        uses: actions/checkout@v4

      - name: Set Environment Context
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi
          echo "IMAGE_TAG=v1.0.0" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy Chart
        run: |
          NAMESPACE="${{ env.ENV_NAME }}-ns"
          
          helm upgrade --install organistation ./ \
            --namespace $NAMESPACE \
            --create-namespace \
            -f ./${{ env.ENV_NAME }}-values.yaml \
            --set global.imageTag=${{ env.IMAGE_TAG }} \
            --set global.keyvaultName=${{ secrets.KEYVAULT_NAME }} \
            --set global.azureTenantId=${{ secrets.AZURE_TENANT_ID }} \
            --set global.userAssignedIdentityID=${{ secrets.AKS_WORKLOAD_IDENTITY_ID }} \
            --set auth.image.name=${{ secrets.ACR_LOGIN_SERVER }}/auth \
            --set ai.image.name=${{ secrets.ACR_LOGIN_SERVER }}/ai \
            --set hr.image.name=${{ secrets.ACR_LOGIN_SERVER }}/hr \
            --set finance.image.name=${{ secrets.ACR_LOGIN_SERVER }}/finance \
            --set projects.image.name=${{ secrets.ACR_LOGIN_SERVER }}/projects \
            --set gateway.image.name=${{ secrets.ACR_LOGIN_SERVER }}/gateway \
            --set notification.image.name=${{ secrets.ACR_LOGIN_SERVER }}/notification \
            --wait \
            --timeout 10m \
            --atomic
            
      - name: Verify Rollout
        run: |
          NAMESPACE="${{ env.ENV_NAME }}-ns"
          # Only verify gateway as a proxy for health
          kubectl rollout status deployment/gateway -n $NAMESPACE --timeout=120s

      - name: Notify Result
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Deployment ${{ job.status }}: OrganiStation ${{ env.ENV_NAME }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            Deployment of OrganiStation to ${{ env.ENV_NAME }} finished with status: ${{ job.status }}
            Namespace: ${{ env.ENV_NAME }}-ns
            Image Tag: ${{ env.IMAGE_TAG }}
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}
