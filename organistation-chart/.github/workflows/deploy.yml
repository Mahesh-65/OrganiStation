name: Continuous Deployment (Helm)

on:
  push:
    branches: [ develop, main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Helm Chart
        uses: actions/checkout@v4

      - name: Set Environment Context
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Deploy Chart
        run: |
          NAMESPACE="${{ env.ENV_NAME }}-ns"
          
          helm upgrade --install organistation ./ \
            --namespace $NAMESPACE \
            --create-namespace \
            -f ./${{ env.ENV_NAME }}-values.yaml \
            --set global.imageTag=${{ env.IMAGE_TAG }} \
            --wait \
            --timeout 10m \
            --atomic
            
      - name: Verify Rollout
        run: |
          NAMESPACE="${{ env.ENV_NAME }}-ns"
          # Only verify gateway as a proxy for health
          kubectl rollout status deployment/gateway -n $NAMESPACE --timeout=120s

      - name: Notify Result
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Deployment ${{ job.status }}: OrganiStation ${{ env.ENV_NAME }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            Deployment of OrganiStation to ${{ env.ENV_NAME }} finished with status: ${{ job.status }}
            Namespace: ${{ env.ENV_NAME }}-ns
            Image Tag: ${{ env.IMAGE_TAG }}
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}
