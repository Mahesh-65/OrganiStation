apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: organistation-ns
  labels:
    azure.workload.identity/use: "true"
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.rollingUpdate.type }}
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.name }}-sa
      containers:
      - name: {{ .Values.name }}
        image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        env:
        - name: AUTH_SERVICE_URL
          value: "http://auth:{{ .Values.serviceUrls.authPort }}"
        - name: AI_SERVICE_URL
          value: "http://ai:{{ .Values.serviceUrls.aiPort }}"
        - name: HR_SERVICE_URL
          value: "http://hr:{{ .Values.serviceUrls.hrPort }}"
        - name: PROJECT_SERVICE_URL
          value: "http://projects:{{ .Values.serviceUrls.projectsPort }}"
        - name: FINANCE_SERVICE_URL
          value: "http://finance:{{ .Values.serviceUrls.financePort }}"
        {{- if .Values.secrets }}
        envFrom:
        - secretRef:
            name: {{ .Values.name }}-secret
        {{- end }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        {{- if .Values.secrets }}
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
        readinessProbe:
          httpGet:
            path: {{ .Values.service.healthPath | default "/health" }}
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 10
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: {{ .Values.service.healthPath | default "/health" }}
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 20
      {{- if .Values.secrets }}
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "{{ .Values.name }}-kv-secrets"
      {{- end }}
