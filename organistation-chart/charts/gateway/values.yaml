name: gateway
replicaCount: 1
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%
image:
  name: maheshnandi/organistation-gateway
  tag: v1.0.0
  pullPolicy: IfNotPresent
service:
  port: 80
  targetPort: 3000
  healthPath: /api/health
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

secrets:
  - name: "JWT-SECRET"
    key: "JWT_SECRET"
  - name: "INTERNAL-SERVICE-SECRET"
    key: "INTERNAL_SERVICE_SECRET"
