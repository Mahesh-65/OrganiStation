name: projects
replicaCount: 2
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%

image:
  name: maheshnandi/organistation-projects
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8003
  healthPath: /health

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

secrets:
  - name: "MONGODB-URI"
    key: "MONGODB_URI"
  - name: "INTERNAL-SERVICE-SECRET"
    key: "INTERNAL_SERVICE_SECRET"
