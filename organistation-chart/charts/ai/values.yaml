name: ai
replicaCount: 2
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%

image:
  name: maheshnandi/organistation-ai
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  port: 8000
  targetPort: 8000
  healthPath: /health

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1.5Gi

secrets:
  - name: "GROQ-API-KEY"
    key: "GROQ_API_KEY"
  - name: "AZURE-STORAGE-CONNECTION-STRING"
    key: "AZURE_STORAGE_CONNECTION_STRING"

persistence:
  enabled: true
  size: 5Gi
  storageClass: default # Switched from azurefile-csi to default for better AKS compatibility
  mountPath: /app/chroma_db
