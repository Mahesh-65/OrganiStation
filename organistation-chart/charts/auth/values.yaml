name: auth
replicaCount: 2
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%

image:
  name: maheshnandi/organistation-auth
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  port: 8001
  targetPort: 8001
  healthPath: /health

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

secrets:
  - name: "MONGODB-URI"
    key: "MONGODB_URI"
  - name: "JWT-SECRET"
    key: "JWT_SECRET"
