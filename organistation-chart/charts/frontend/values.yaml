name: frontend
replicaCount: 2
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 25%
  maxSurge: 25%

image:
  name: maheshnandi/organistation-frontend
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 80
  healthPath: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
