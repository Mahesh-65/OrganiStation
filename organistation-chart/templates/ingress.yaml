apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
    - http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
          - path: /api/roles
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    # Frontend calls /api/ai/health -> Backend expects /api/health
    appgw.ingress.kubernetes.io/backend-path-prefix: "/api/"
spec:
  rules:
    - http:
        paths:
          - path: /api/ai/
            pathType: Prefix
            backend:
              service:
                name: ai
                port:
                  number: 80
---
