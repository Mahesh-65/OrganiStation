name: Reusable CI Pipeline (ACR)

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -Dsonar.projectKey=${{ inputs.sonar_project_key }}
      - name: Send Sonar Failure Mail
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Sonar Failed - ${{ github.repository }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            SonarQube scan failed in repo: ${{ github.repository }}

  snyk:
    name: Snyk Scan
    needs: sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then npm install; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
      - name: Send Snyk Failure Mail
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Snyk Failed - ${{ github.repository }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            Snyk vulnerability scan failed in repo: ${{ github.repository }}

  trivy:
    name: Trivy Scan
    needs: snyk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Temp Image
        run: docker build -t temp:${{ github.sha }} .
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: temp:${{ github.sha }}
          exit-code: 0
          severity: HIGH,CRITICAL

  push:
    name: Build and Push to ACR
    needs: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${{ github.ref_name }}-$SHORT_SHA"
          IMAGE_PATH="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:$TAG"
          
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH
          
          # Also push 'latest' for the specific branch
          docker tag $IMAGE_PATH "${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:latest"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:latest"

      - name: Send Completion Mail
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Result: ${{ job.status }} - ${{ github.repository }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            CI Pipeline finished with status: ${{ job.status }}
            Image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ github.ref_name }}
