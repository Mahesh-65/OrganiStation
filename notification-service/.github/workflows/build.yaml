name: Notification Service CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      pull-requests: write
    uses: OrganiStation-org/shared-workflows/.github/workflows/reusable-ci.yaml@v2
    with:
      image_name: notification-service
      sonar_project_key: organistation-notification
      sonar_org: "OrganiStation-org"
    secrets: inherit
